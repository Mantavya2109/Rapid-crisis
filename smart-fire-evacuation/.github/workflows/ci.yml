name: Smart Fire Evacuation Edge Controller CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        # rpi-ws281x requires system dependencies or skips if not pi, but we can install it
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. 
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run PyTest
      run: |
        pytest tests/ --cov=. --cov-report=xml

    - name: Build Docker Image
      run: |
        # This acts as a dry-run build to ensure dependencies and dockerfile compile successfully.
        if [ -f Dockerfile ]; then docker build -t fire-edge-controller:latest .; fi
